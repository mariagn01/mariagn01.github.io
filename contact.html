<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
      const pageWrapper = document.getElementById("page-wrapper");
      const page = document.getElementById("page");

      pageWrapper.classList.remove("translate-x-full");

      // Aktiver klikking etter animasjonen er ferdig
      setTimeout(() => {
        page.classList.remove("pointer-events-none");
        page.classList.add("pointer-events-auto");
      }, 500);
    });

    function navigateLeft(event, url) {
      event.preventDefault();
      const pageWrapper = document.getElementById("page-wrapper");
      const page = document.getElementById("page");

      // Deaktiver klikking under animasjon
      page.classList.add("pointer-events-none");
      pageWrapper.classList.add("-translate-x-full");

      setTimeout(() => {
        window.location.href = url;
      }, 500);
    }

    function navigateRight(event, url) {
      event.preventDefault();
      const pageWrapper = document.getElementById("page-wrapper");
      const page = document.getElementById("page");

      // Deaktiver klikking under animasjon
      page.classList.add("pointer-events-none");
      pageWrapper.classList.add("translate-x-full");

      setTimeout(() => {
        window.location.href = url;
      }, 500);
    }

    </script>
  </head>
  <body class="bg-[#eee4e1] text-black font-press-start relative overflow-hidden">
    <nav class="top-0 left-0 right-0 p-4 relative z-10">
      <div class="container mx-auto flex justify-between items-center">
        <a href="projects.html" class="text-sm sm:text-base hover:text-gray-600"
        onclick="navigateRight(event, 'projects.html')"
          >&lt; PREV</a
        >
        <div class="space-x-4 sm:space-x-6">
          <a href="index.html" class="text-sm hover:text-gray-600"
          onclick="navigateLeft(event, 'index.html')"
          >HOME ></a>
        </div>
      </div>
    </nav>
    <div id="page-wrapper"
  class="fixed top-0 left-0 w-screen h-screen transform transition-transform duration-500 translate-x-full">
  <div id="page" class="h-full pointer-events-auto">
      <div
        class="min-h-screen flex items-center justify-center p-4 sm:p-8 pt-20">
        <div class="container max-w-4xl mx-auto">
          <h2 class="text-2xl sm:text-3xl mb-8">> CONTACT</h2>
          <div class="bg-gray-200 border-2 border-gray-400 shadow-lg; position: relative">
            <div class="bg-blue-900 text-white px-4 py-2 flex justify-between items-center;
            font-size: 14px">
              <span>New Message - Contact.exe</span>
              <div class="gap-2">
                <button class="align-middle">-</button>
                <button class="align-middle">×</button>
              </div>
            </div>
            
            <div class="bg-white p-6 border-t-2 border-gray-400">
              <div class="space-y-4 mb-6">
                <div class="flex">
                  <span class="w-20 text-xs">To:</span>
                  <span class="text-xs">Maria</span>
                </div>
                <div class="flex space-x-6">
                  <span class="w-20 text-xs">Subject: </span>
                  <span class="text-xs">Let's Connect!</span>
                </div>
                <hr class="border-gray-300" />
              </div>
  
              <div class="space-y-6">
                <div class="space-y-4">
                  <div class="pl-4">
                    <a href="mailto:mgnielsen@proton.me" class="block text-sm hover:text-gray-600">📧 Send me an e-mail</a>
                  </div>
                </div>
  
                <div class="space-y-4">
                  <p class="text-sm">Connect with me on:</p>
                  <div class="pl-4 space-y-2">
                    <a href="https://www.linkedin.com/in/mgnielsen01/" class="block text-sm hover:text-gray-600" target="_blank">LINKEDIN</a>
                    <a href="https://github.com/mariagn01" class="block text-sm hover:text-gray-600" target="_blank">GITHUB</a>
                    <a href="https://www.goodreads.com/user/show/126549560-maria-granli" class="block text-sm hover:text-gray-600" target="_blank">GOODREADS</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
