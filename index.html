<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Maria's website</title>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
      const page = document.getElementById("page");
      if (page) {
        page.classList.remove("translate-x-full");}
      });

      function navigateLeft(event, url) {
        event.preventDefault();
        const page = document.getElementById("page");

        // Skyver ut til venstre
        page.classList.add("-translate-x-full");

        setTimeout(() => {
          window.location.href = url;
        }, 500); // Matcher transition duration
      }

      function navigateRight(event, url) {
        event.preventDefault();
        const page = document.getElementById("page");

        // Skyver ut til høyre
        page.classList.add("translate-x-full");

        setTimeout(() => {
          window.location.href = url;
        }, 500);
      }
  </script>
  </head>
  <body class="bg-[#eee4e1] text-black font-press-start relative overflow-hidden">
    <div id="page"
         class="absolute top-0 left-0 w-screen h-screen transform transition-transform duration-500 translate-x-full">
    <div class="min-h-screen flex items-center justify-center sm:justify-start">
      <div class="container max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 p-8">
        <!-- Left Column -->
        <div class="flex flex-col justify-center space-y-8">
          
            <div class="flex flex-row items-center">
              <h1 class="text-8xl">Maria</h1>
              <img class="w-32 h-32 scale-75 ml-2 mb-2" src="images/hello-world.png">
            </div>
            <p class="text-sm mt-0">SOFTWARE ENGINEERING STUDENT</p>
          
          <div class="space-y-4">
            <h2 class="text-xl mb-4">> CONNECT</h2>
            <div class="space-y-2">
              <a href="https://github.com/mariagn01" target="_blank" class="block hover:text-gray-600 transition-colors">GITHUB</a>
              <a href="https://www.linkedin.com/in/mgnielsen01/" target="_blank" class="block hover:text-gray-600 transition-colors">LINKEDIN</a>
            </div>
          </div>
        </div>

        <!-- Right Column -->
        <div class="flex items-center md:justify-center sm:justify-start">
          <nav class="md:space-y-6 sm:space-y-2">
            <a href="about.html" class="relative text-black hover:text-gray-600 transition-colors duration-300 py-2 block menu-item"
            onclick="navigateLeft(event, 'about.html')">
              ABOUT
            </a>            
            <a href="skills.html" class="relative text-black hover:text-gray-600 transition-colors duration-300 py-2 block menu-item">
              SKILLS
            </a>            
            <a href="projects.html" class="relative text-black hover:text-gray-600 transition-colors duration-300 py-2 block menu-item">
              PROJECTS
            </a>            
            <a href="contact.html" class="relative text-black hover:text-gray-600 transition-colors duration-300 py-2 block menu-item">
              CONTACT
            </a>
            
          </nav>
        </div>
      </div>
    </div>
    </div>
  </body>
</html>
