<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
      const pageWrapper = document.getElementById("page-wrapper");
      const page = document.getElementById("page");

      pageWrapper.classList.remove("translate-x-full");

      // Aktiver klikking etter animasjonen er ferdig
      setTimeout(() => {
        page.classList.remove("pointer-events-none");
        page.classList.add("pointer-events-auto");
      }, 500);
    });

    function navigateLeft(event, url) {
      event.preventDefault();
      const pageWrapper = document.getElementById("page-wrapper");
      const page = document.getElementById("page");

      // Deaktiver klikking under animasjon
      page.classList.add("pointer-events-none");
      pageWrapper.classList.add("-translate-x-full");

      setTimeout(() => {
        window.location.href = url;
      }, 500);
    }

    function navigateRight(event, url) {
      event.preventDefault();
      const pageWrapper = document.getElementById("page-wrapper");
      const page = document.getElementById("page");

      // Deaktiver klikking under animasjon
      page.classList.add("pointer-events-none");
      pageWrapper.classList.add("translate-x-full");

      setTimeout(() => {
        window.location.href = url;
      }, 500);
    }

    </script>
  </head>
  <body
    class="bg-[#eee4e1] text-black font-press-start relative overflow-hidden"
  >
    <nav class="top-0 left-0 right-0 p-4 relative z-10">
      <div class="container mx-auto flex justify-between items-center">
        <a href="skills.html" class="text-sm sm:text-base hover:text-gray-600"
          >&lt; PREV</a
        >
        <div class="space-x-4 sm:space-x-6">
          <a href="contact.html" class="text-sm hover:text-gray-600">NEXT ></a>
        </div>
      </div>
    </nav>
    <div id="page-wrapper"
  class="fixed top-0 left-0 w-screen h-screen transform transition-transform duration-500 translate-x-full">
  <div id="page" class="h-full pointer-events-auto">
      <div
        class="min-h-screen flex items-center justify-center p-4 sm:p-8 pt-20"
      >
        <div class="container max-w-4xl mx-auto">
          <h2 class="text-2xl sm:text-3xl mb-8">> PROJECTS</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div
              class="p-6 border-2 border-black hover:bg-gray-100 transition-colors duration-300;"
            >
              <h3 class="text-lg mb-2">WEATHER APP</h3>
              <p class="text-sm mb-4">
                A JavaScript app that provides real-time data for the user's
                current location or any specified city.
              </p>
              <div class="space-x-4">
                <a
                  href="https://github.com/mariagn01/weather-app"
                  class="text-sm hover:text-gray-600"
                  target="_blank"
                  >VIEW</a
                >
              </div>
            </div>
            <div
              class="p-6 border-2 border-black hover:bg-gray-100 transition-colors duration-300;"
            >
              <h3 class="text-lg mb-2">MOVIE TICKETS</h3>
              <p class="text-sm mb-4">
                A full-stack web application that let you purchase, view and
                delete movie tickets.
              </p>
              <div class="space-x-4">
                <a
                  href="https://github.com/mariagn01/movie-tickets"
                  class="text-sm hover:text-gray-600"
                  target="_blank"
                  >VIEW</a
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    </div>
  </body>
</html>
